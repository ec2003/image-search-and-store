x-app-environment: &app-environment
  DEBUG: ${COMPOSE_DEBUG:-True}
  DJANGO_SECRET_KEY: ${COMPOSE_DJANGO_SECRET_KEY:-compose-dev-secret-key-change-me}
  DJANGO_ALLOWED_HOSTS: ${COMPOSE_DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,api}
  CSRF_TRUSTED_ORIGINS: ${COMPOSE_CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
  USE_SQLITE: "False"
  POSTGRES_DB: ${POSTGRES_DB:-image_search}
  POSTGRES_USER: ${POSTGRES_USER:-image_search}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-image_search_password}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-images}
  S3_REGION_NAME: ${S3_REGION_NAME:-us-east-1}
  S3_USE_SSL: "False"
  S3_PRESIGNED_EXPIRE_SECONDS: ${S3_PRESIGNED_EXPIRE_SECONDS:-900}
  QDRANT_URL: http://qdrant:6333
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-image_assets_effnetv2_s_1280}
  QDRANT_TIMEOUT_SECONDS: ${QDRANT_TIMEOUT_SECONDS:-5}
  IMAGE_MAX_SIZE_BYTES: ${IMAGE_MAX_SIZE_BYTES:-10485760}
  IMAGE_ALLOWED_CONTENT_TYPES: ${IMAGE_ALLOWED_CONTENT_TYPES:-image/jpeg,image/png,image/webp}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-image.embeddings.EfficientNetV2EmbeddingProvider}
  EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-efficientnetv2-s-imagenet1k-v1}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1280}
  EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
  EMBEDDING_TORCH_THREADS: ${EMBEDDING_TORCH_THREADS:-1}
  TORCH_HOME: ${TORCH_HOME:-/opt/torch-cache}

services:
  api:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn image_search_and_store.wsgi:application --bind 0.0.0.0:8000"
    environment: *app-environment
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - staticfiles:/app/staticfiles

  worker:
    build: .
    command: celery -A image_search_and_store worker --loglevel=info
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-image_search}
      POSTGRES_USER: ${POSTGRES_USER:-image_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-image_search_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  redis_data:
  rabbitmq_data:
  staticfiles:
