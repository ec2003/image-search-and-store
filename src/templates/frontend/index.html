{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Vector Search — Visual similarity search</title>
    <meta name="description" content="Upload, store, and search images by visual similarity using deep learning embeddings." />
    <meta property="og:title" content="Image Vector Search" />
    <meta property="og:description" content="Upload, store, and search images by visual similarity using deep learning embeddings." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
    <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}" />
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="app-layout">
        <!-- ─── Sidebar ──────────────────────────── -->
        <nav class="sidebar" aria-label="Main navigation">
            <div class="sidebar-header">
                <h2>IVS</h2>
                <span class="sidebar-subtitle">Image Vector Search</span>
            </div>
            <ul class="sidebar-nav" role="tablist">
                <li class="nav-item active" data-tab="gallery" role="tab" aria-selected="true" tabindex="0">
                    <span class="nav-icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="3" width="7" height="7" rx="1"/>
                            <rect x="3" y="14" width="7" height="7" rx="1"/>
                            <rect x="14" y="14" width="7" height="7" rx="1"/>
                        </svg>
                    </span>
                    <span class="nav-label">Gallery</span>
                </li>
                <li class="nav-item" data-tab="upload" role="tab" aria-selected="false" tabindex="-1">
                    <span class="nav-icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </span>
                    <span class="nav-label">Upload</span>
                </li>
                <li class="nav-item" data-tab="search" role="tab" aria-selected="false" tabindex="-1">
                    <span class="nav-icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </span>
                    <span class="nav-label">Search</span>
                </li>
            </ul>
        </nav>

        <!-- ─── Main Content ──────────────────────── -->
        <main class="main-content" id="main-content">

            <!-- ═══ GALLERY TAB ═══ -->
            <section id="tab-gallery" class="tab-content active" role="tabpanel" aria-label="Gallery">
                <h1>Image Gallery</h1>
                <!-- Skeleton loader shown during initial load -->
                <div id="gallery-skeleton" class="skeleton-grid">
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-image"></div>
                        <div class="skeleton-body">
                            <div class="skeleton skeleton-text-short"></div>
                            <div class="skeleton skeleton-text-long"></div>
                            <div class="skeleton skeleton-text-meta"></div>
                        </div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-image"></div>
                        <div class="skeleton-body">
                            <div class="skeleton skeleton-text-short"></div>
                            <div class="skeleton skeleton-text-long"></div>
                            <div class="skeleton skeleton-text-meta"></div>
                        </div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-image"></div>
                        <div class="skeleton-body">
                            <div class="skeleton skeleton-text-short"></div>
                            <div class="skeleton skeleton-text-long"></div>
                            <div class="skeleton skeleton-text-meta"></div>
                        </div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-image"></div>
                        <div class="skeleton-body">
                            <div class="skeleton skeleton-text-short"></div>
                            <div class="skeleton skeleton-text-long"></div>
                            <div class="skeleton skeleton-text-meta"></div>
                        </div>
                    </div>
                </div>
                <div id="gallery" class="gallery" style="display:none;"></div>
                <div id="gallery-pagination" class="pagination" style="display:none;"></div>
            </section>

            <!-- ═══ UPLOAD TAB ═══ -->
            <section id="tab-upload" class="tab-content" role="tabpanel" aria-label="Upload image">
                <h1>Upload images</h1>
                <div class="card">
                    <form id="uploadForm" class="upload-form" novalidate>
                        <div class="form-group">
                            <label for="up-image">Choose file (support multiple files)</label>
                            <input type="file" id="up-image" accept="image/*" multiple required aria-required="true" />
                        </div>
                        <button type="submit" class="btn btn-primary" id="uploadBtn">
                            <span class="btn-text">Upload</span>
                        </button>
                    </form>
                    <div id="uploadMessage" class="message-box" style="display:none;"></div>
                </div>
                <!-- Upload status list -->
                <div id="uploadStatusList" class="status-list" aria-live="polite" aria-relevant="additions"></div>
            </section>

            <!-- ═══ SEARCH TAB ═══ -->
            <section id="tab-search" class="tab-content" role="tabpanel" aria-label="Search images">
                <h1>Search similar images</h1>
                <div class="card">
                    <form id="searchForm" class="upload-form" novalidate>
                        <div class="form-group">
                            <label for="sr-image">Choose a query image</label>
                            <input type="file" id="sr-image" accept="image/*" required aria-required="true" />
                        </div>
                        <button type="submit" class="btn btn-primary" id="searchBtn">
                            <span class="btn-text">Search</span>
                        </button>
                    </form>
                    <div id="searchMessage" class="message-box" style="display:none;"></div>
                </div>

                <!-- Search results -->
                <div id="searchResults" class="search-results" style="display:none;">
                    <div class="search-layout">
                        <div class="query-preview">
                            <h3>Query image</h3>
                            <img id="queryImagePreview" src="" alt="" />
                        </div>
                        <div class="results-grid" id="resultsGrid">
                            <!-- Results rendered here -->
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="{% static 'frontend/js/app.js' %}"></script>
</body>
</html>
